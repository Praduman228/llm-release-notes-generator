name: Auto Release Notes V2.5

on:
  pull_request:
    types: [closed]
    
permissions:
  contents: write

jobs:
  release-notes:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install axios

      - name: Write script
        env:
          PR_DATA: ${{ toJson(github.event.pull_request) }}
        run: |
          cat > release_notes.js << 'JSEOF'
          const axios = require("axios");

          const prRaw = JSON.parse(process.env.PR_DATA);

          const pr = {
            title: prRaw.title,
            body: prRaw.body || "N/A",
            diff_url: prRaw.diff_url,
            html_url: prRaw.html_url
          };

          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;

          async function run() {
            const diffRes = await axios.get(pr.diff_url, {
              headers: {
                Authorization: "Bearer " + process.env.GITHUB_TOKEN,
                Accept: "application/vnd.github.v3.diff"
              }
            });

            const diff = diffRes.data.slice(0, 6000);

            const aiRes = await axios.post(
              "https://openrouter.ai/api/v1/chat/completions",
              {
                model: "openrouter/owl-alpha",
                messages: [{
                  role: "user",
                  content: "Return JSON only, no markdown:\n{\"type\":\"Feature|Bug Fix|Refactor|Improvement\",\"summary\":\"one-line summary\"}\n\nPR Title: " + pr.title + "\nDescription: " + pr.body + "\nCode:\n" + diff
                }]
              },
              {
                headers: {
                  Authorization: "Bearer " + process.env.OPENROUTER_API_KEY
                }
              }
            );

            let result;
            try {
              const raw = aiRes.data.choices[0].message.content
                .replace(/```json|```/g, "").trim();
              result = JSON.parse(raw);
            } catch (e) {
              result = { type: "Improvement", summary: pr.title };
            }

            const line = "- **[" + result.type + "]** " + result.summary + " ([PR](" + pr.html_url + "))";

            const tag = "latest";
            const releaseName = "Latest Updates";

            let release;
            try {
              const res = await axios.get(
                "https://api.github.com/repos/" + owner + "/" + repo + "/releases/tags/" + tag,
                { headers: { Authorization: "Bearer " + process.env.GITHUB_TOKEN } }
              );
              release = res.data;
            } catch (e) {
              const res = await axios.post(
                "https://api.github.com/repos/" + owner + "/" + repo + "/releases",
                {
                  tag_name: tag,
                  name: releaseName,
                  body: "## Release Notes\n",
                  draft: false,
                  prerelease: false
                },
                { headers: { Authorization: "Bearer " + process.env.GITHUB_TOKEN } }
              );
              release = res.data;
            }

            const updatedBody = (release.body || "") + "\n" + line;

            await axios.patch(
              "https://api.github.com/repos/" + owner + "/" + repo + "/releases/" + release.id,
              { body: updatedBody },
              { headers: { Authorization: "Bearer " + process.env.GITHUB_TOKEN } }
            );

            console.log("Release notes updated");
          }

          run().catch(function(err) { console.error(err); process.exit(1); });
          JSEOF

      - name: Run script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DATA: ${{ toJson(github.event.pull_request) }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node release_notes.js
